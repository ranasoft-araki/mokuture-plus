<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mokuture+</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{width:100vw;height:100vh;overflow:hidden;background:#0a0806;font-family:'Noto Sans JP',Inter,system-ui,sans-serif}
#sw{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
#sc{width:1920px;height:1080px;transform-origin:center center;overflow:hidden;position:relative}
button{font-family:inherit}

@keyframes fade-in{from{opacity:0}to{opacity:1}}
@keyframes ring-expand{0%{transform:scale(1);opacity:.4}100%{transform:scale(2.2);opacity:0}}
@keyframes cursor-blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes check-draw{to{stroke-dashoffset:0}}
@keyframes scan-line{0%{top:4px}100%{top:calc(100% - 4px)}}
@keyframes dot-pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.7)}}
@keyframes dot-bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes scale-in{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes slide-in-up{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes fade-out{from{opacity:1}to{opacity:0}}
@keyframes pop-in{from{opacity:0;transform:scale(0.85)}to{opacity:1;transform:scale(1)}}
@keyframes ripple{from{transform:scale(0);opacity:.4}to{transform:scale(3);opacity:0}}
</style>
<script src="/jsqr.min.js"></script>
</head>
<body>
<div id="sw"><div id="sc"></div></div>
<script>
// ─── State ────────────────────────────────────────────────────────────────────
let CFG = { tenant_slug: "", remote_api_url: "", device_name: "" };
let ST = {
  brand_color: "#4a7c4e",
  kiosk_welcome_message: "ようこそ",
  kiosk_sub_message: "ご用件をお選びください",
  kiosk_calling_message: "担当者をお呼びしています",
  kiosk_complete_message: "担当者がご案内します",
  kiosk_idle_timeout_sec: 60,
  kiosk_complete_timeout_sec: 10,
  kiosk_style: "default",
  purpose_list: [],
};
let ITEMS = [];
let TRANSITION_TYPE = "fade";
let CLEANUPS = [];
let CURRENT_SCREEN = "idle";

const sc = document.getElementById("sc");
const TOKEN_KEY = "mokuture_kiosk_token";
const NAME_KEY  = "mokuture_kiosk_name";

// ─── Scale ────────────────────────────────────────────────────────────────────
function rescale() {
  sc.style.transform = `scale(${Math.min(innerWidth / 1920, innerHeight / 1080)})`;
}
window.addEventListener("resize", rescale);
rescale();

// ─── Cleanup helpers ─────────────────────────────────────────────────────────
function later(ms, fn) {
  const id = setTimeout(fn, ms);
  CLEANUPS.push(() => clearTimeout(id));
}
function every(ms, fn) {
  const id = setInterval(fn, ms);
  CLEANUPS.push(() => clearInterval(id));
  return id;
}
function onSc(event, fn) {
  sc.addEventListener(event, fn);
  CLEANUPS.push(() => sc.removeEventListener(event, fn));
}
function cleanup() { CLEANUPS.forEach(f => f()); CLEANUPS = []; }

// ─── API helpers ─────────────────────────────────────────────────────────────
async function apiFetch(method, path, body, token) {
  const h = { "Content-Type": "application/json" };
  if (token) h["X-Kiosk-Token"] = token;
  const r = await fetch(path, {
    method,
    headers: h,
    body: body != null ? JSON.stringify(body) : undefined,
  });
  if (!r.ok) {
    const e = await r.json().catch(() => ({ detail: r.statusText }));
    throw new Error(e.detail ?? "Request failed");
  }
  return r.status === 204 ? null : r.json();
}
const apiGet  = (p, tok)    => apiFetch("GET",  p, null, tok);
const apiPost = (p, b, tok) => apiFetch("POST", p, b,    tok);

// ─── Clock ────────────────────────────────────────────────────────────────────
function fmtClock() {
  const d = new Date();
  return `${d.getFullYear()}.${pad(d.getMonth()+1)}.${pad(d.getDate())} · ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function pad(n) { return String(n).padStart(2, "0"); }
function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ─── SVG icons ───────────────────────────────────────────────────────────────
const ICO = {

  qr:        `<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><path d="M14 14h3v3h-3zM20 14h1M14 20h1M17 18v3M20 17v4"/></svg>`,
  truck:     `<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13" rx="1"/><path d="M16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>`,
  more:      `<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>`,
  arrow:     `<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>`,
  bell_sm:   `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0v5l2 3H4l2-3z"/><path d="M10 19a2 2 0 0 0 4 0"/></svg>`,
  bell_lg:   `<svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0v5l2 3H4l2-3z"/><path d="M10 19a2 2 0 0 0 4 0"/></svg>`,
  check_sm:  `<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 6"/></svg>`,
  check_lg:  `<svg width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 6" stroke-dasharray="60" stroke-dashoffset="60" style="animation:check-draw .6s .3s cubic-bezier(.2,.9,.3,1) forwards"/></svg>`,
  arrow_lg:  `<svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>`,
  clock:     `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>`,
  locker:    `<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="1.5"/><line x1="4" y1="8.5" x2="20" y2="8.5"/><line x1="4" y1="15" x2="20" y2="15"/><circle cx="16" cy="5.5" r="0.6"/><circle cx="16" cy="11.5" r="0.6"/><circle cx="16" cy="18" r="0.6"/></svg>`,
  pin:       `<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>`,
};

// ─── Navigate ─────────────────────────────────────────────────────────────────
function go(screen, data = {}) {
  const outEl = sc.firstElementChild;
  const shouldAnimate = !!outEl && CURRENT_SCREEN !== screen;
  CURRENT_SCREEN = screen;
  cleanup();

  function showScreen() {
    sc.style.animation = "";
    if      (screen === "idle")           showIdle();
    else if (screen === "welcome")        showWelcome();
    else if (screen === "top")            showTop();
    else if (screen === "reception")      showReception(data.purpose ?? "");
    else if (screen === "qr")             showQr();
    else if (screen === "locker")         showComingSoon("locker");
    else if (screen === "delivery")       showComingSoon("delivery");
    else if (screen === "calling")        showCalling(data);
    else if (screen === "complete")       showComplete(data);
    else if (screen === "kiosk-settings") showKioskSettings();
  }

  if (shouldAnimate) {
    outEl.style.animation = "fade-out .5s ease-in forwards";
    setTimeout(showScreen, 540);
  } else {
    showScreen();
  }
}

// ─── SETUP ───────────────────────────────────────────────────────────────────
function showSetup() {
  let pin = "", verifying = false;

  function render(errMsg) {
    const dots = Array.from({length: 6}, (_, i) => {
      const on = i < pin.length;
      return `<div style="width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;border:1px solid ${on?"#4a7c4e":"#3a3530"};background:${on?"#4a7c4e":"#2a2720"};color:#faf8f4">${on?"●":""}</div>`;
    }).join("");

    const PAD = ["1","2","3","4","5","6","7","8","9","⌫","0","→"];
    const padHtml = PAD.map(k => {
      const isConfirm = k === "→";
      const isDisabled = verifying || (isConfirm && pin.length < 6);
      return `<button data-pk="${escHtml(k)}" style="height:64px;border-radius:16px;font-size:${k.length>1?14:20}px;font-weight:600;cursor:${isDisabled?"not-allowed":"pointer"};border:1px solid ${isConfirm?"#4a7c4e":"#3a3530"};background:${isConfirm?"#4a7c4e":"#2a2720"};color:${isConfirm?"#faf8f4":"#c8c0b0"};opacity:${isDisabled?.35:1};transition:opacity .15s">${isConfirm?"決定":k}</button>`;
    }).join("");

    sc.innerHTML = `
<div style="width:1920px;height:1080px;background:#1d1a15;display:flex;align-items:center;justify-content:center">
  <div style="display:flex;flex-direction:column;align-items:center;gap:32px;width:320px">
    <div style="text-align:center">
      <p style="color:#faf8f4;font-size:24px;font-weight:300;letter-spacing:6px">mokuture+</p>
      <p style="color:#8a8070;font-size:14px;margin-top:6px">キオスク端末セットアップ</p>
    </div>
    <div style="display:flex;gap:12px">${dots}</div>
    ${errMsg ? `<div style="width:100%;padding:12px 16px;background:rgba(200,60,60,.2);border:1px solid rgba(200,60,60,.4);border-radius:10px;color:#f88;font-size:13px;text-align:center">${escHtml(errMsg)}</div>` : ""}
    ${verifying ? `<p style="color:#8a8070;font-size:14px;animation:dot-pulse 1.4s ease-in-out infinite">確認中…</p>` : ""}
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%">${padHtml}</div>
    <p style="color:#5a5347;font-size:11px;text-align:center">管理画面「キオスク端末」→「端末を追加」でPINを発行</p>
  </div>
</div>`;
    rescale();

    sc.querySelectorAll("[data-pk]").forEach(btn => {
      btn.addEventListener("click", () => handleKey(btn.dataset.pk));
    });
  }

  async function verifyPin(code) {
    verifying = true;
    render("");
    try {
      const data = await apiPost("/setup", { pin_code: code });
      localStorage.setItem(TOKEN_KEY, data.device_token);
      localStorage.setItem(NAME_KEY, data.device_name);
      cleanup();
      await boot();
    } catch (e) {
      verifying = false;
      pin = "";
      render("PINが無効です。管理画面で新しいPINを発行してください。");
    }
  }

  function handleKey(key) {
    if (verifying) return;
    if (key === "⌫") { pin = pin.slice(0, -1); render(""); }
    else if (key === "→") { if (pin.length === 6) verifyPin(pin); }
    else if (pin.length < 6) {
      pin += key;
      render("");
      if (pin.length === 6) verifyPin(pin);
    }
  }

  render("");
}

// ─── Single design tokens (磯野木工所 和モダン / moss green) ──────────────────
const T = {

  border: "#e7e2d8", borderStrong: "#d8d3c7",

function devName() { return escHtml(localStorage.getItem(NAME_KEY) ?? "kiosk"); }

// ─── IDLE ─────────────────────────────────────────────────────────────────────
// 人感センサー(PIR)で来訪を検知し、受付メニューへ自動遷移する(タッチ操作は不要)。
// 画面には屋号・タグラインのみを表示し、誘導CTAは出さない。
// PIR非搭載/開発環境向けに画面タップでも遷移できるが、画面上には文言を出さない。
function showIdle() {
  const bc = ST.brand_color;
  const brand = ST.logo_url
    ? `<img src="${escHtml(ST.logo_url)}" style="max-width:820px;max-height:320px;object-fit:contain" alt="logo">`
    : `<div style="font-size:120px;font-weight:600;color:#f5efe3;letter-spacing:-3px;line-height:1.04">${escHtml(ST.kiosk_welcome_message)}</div>`;

  sc.innerHTML = `<div id="idle-root" style="width:1920px;height:1080px;position:relative;overflow:hidden;background:${T.idleBg};cursor:none;user-select:none">
  <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:38px;text-align:center;padding:0 140px">
    ${brand}
    <div style="width:84px;height:2px;background:${bc};opacity:.9"></div>
    <div style="font-size:34px;color:rgba(245,239,227,.7);letter-spacing:3px;font-weight:300">${escHtml(ST.kiosk_sub_message)}</div>
  </div>
  <div style="position:absolute;inset:0;z-index:10;pointer-events:none"></div>
</div>`;
  rescale();

  const root = document.getElementById("idle-root");

  let advanced = false;
  function advance() { if (advanced) return; advanced = true; cleanup(); go("top"); }
  onSc("click", advance);

  // 人感センサー(PIR)ポーリング: 来訪を検知したら受付メニューへ自動遷移
  every(700, async () => {
    try {
      const r = await fetch("/device/pir").then(res => res.ok ? res.json() : null);
      if (r && r.motion_detected) advance();
    } catch {}
  });
  if (ITEMS.length === 0) return;

  let idx = 0;

  function showItem() {
    const old = root.querySelector(".media-el");

    const item = ITEMS[idx];
    if (!item?.media) { if (old) old.remove(); later(3000, nextItem); return; }

    const url = `/media/${item.media.id}`;
    const overlay = root.querySelector("[style*='z-index:10']");

    function applyTransition(newEl, oldEl) {
      const _types = ["fade", "slide", "zoom", "wipe"];
      const type = TRANSITION_TYPE === "random"
        ? _types[Math.floor(Math.random() * _types.length)]
        : TRANSITION_TYPE;
      const rAF = (fn) => requestAnimationFrame(() => requestAnimationFrame(fn));

      if (type === "slide") {
        newEl.style.cssText += ";transform:translateX(100%);transition:transform 1.2s cubic-bezier(.25,.46,.45,.94)";
        root.insertBefore(newEl, overlay);
        rAF(() => {
          newEl.style.transform = "translateX(0)";
          if (oldEl) {
            oldEl.style.transition = "transform 1.2s cubic-bezier(.25,.46,.45,.94)";
            oldEl.style.transform = "translateX(-100%)";
            setTimeout(() => { if (oldEl.parentNode) oldEl.remove(); }, 1300);
          }
        });
      } else if (type === "zoom") {
        newEl.style.cssText += ";transform:scale(1.1);opacity:0;transition:transform 1.5s ease,opacity 1.5s ease";
        root.insertBefore(newEl, overlay);
        rAF(() => {
          newEl.style.transform = "scale(1)";
          newEl.style.opacity = "1";
          if (oldEl) {
            oldEl.style.transition = "opacity 1.5s ease";
            oldEl.style.opacity = "0";
            setTimeout(() => { if (oldEl.parentNode) oldEl.remove(); }, 1600);
          }
        });
      } else if (type === "wipe") {
        newEl.style.cssText += ";clip-path:inset(0 100% 0 0);transition:clip-path 1.2s cubic-bezier(.76,0,.24,1)";
        root.insertBefore(newEl, overlay);
        rAF(() => {
          newEl.style.clipPath = "inset(0 0% 0 0)";
          if (oldEl) {
            oldEl.style.transition = "opacity 1.2s ease";
            oldEl.style.opacity = "0";
            setTimeout(() => { if (oldEl.parentNode) oldEl.remove(); }, 1300);
          }
        });
      } else {
        // fade (default)
        newEl.style.cssText += ";opacity:0;transition:opacity 1.8s ease";
        root.insertBefore(newEl, overlay);
        rAF(() => {
          newEl.style.opacity = "1";
          if (oldEl) {
            oldEl.style.transition = "opacity 1.8s ease";
            oldEl.style.opacity = "0";
            setTimeout(() => { if (oldEl.parentNode) oldEl.remove(); }, 1900);
          }
        });
      }
    }

    const remoteUrl = item.media.url ?? null;

    if (item.media.mime_type === "video/mp4") {
      const v = document.createElement("video");
      v.className = "media-el";
      v.src = url;
      v.autoplay = v.muted = v.playsInline = true;
      v.loop = ITEMS.length === 1;
      v.style.cssText = "position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0";
      v.onended = nextItem;
      v.onerror = () => {
        if (remoteUrl && v.src !== remoteUrl) { v.src = remoteUrl; v.load(); v.play().catch(() => {}); }
        else nextItem();
      };
      applyTransition(v, old);
      v.play().catch(() => {});
    } else {
      const img = document.createElement("img");
      img.className = "media-el";
      img.src = url;
      img.alt = "";
      img.style.cssText = "position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0";
      img.onerror = () => {
        if (remoteUrl && img.src !== remoteUrl) { img.src = remoteUrl; }
        else nextItem();
      };
      applyTransition(img, old);
      later(item.duration_sec * 1000, nextItem);
    }
  }

  function nextItem() {
    idx = (idx + 1) % ITEMS.length;
    showItem();
  }

  showItem();
}
// ─── VISIT (QR check) ─────────────────────────────────────────────────────────
// 「ご訪問」選択後: QRコードの有無を選ぶ。

  <div style="padding:28px 80px 0;flex-shrink:0">

  </div>
  <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:64px;min-height:0">
    <div style="text-align:center">
      <div style="font-size:64px;font-weight:600;color:${T.ink};letter-spacing:-2px;line-height:1.1">QRコードはお持ちですか？</div>
      <div style="font-size:24px;color:${T.muted};font-family:Inter,system-ui,sans-serif;letter-spacing:1px;margin-top:12px">Do you have a QR code?</div>
    </div>
    <div style="display:flex;gap:44px">
      <button id="wel-qr" style="width:560px;height:300px;border-radius:32px;border:2.5px solid ${T.borderStrong};background:${T.canvas};display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;cursor:pointer">
        <div style="color:${bc};transform:scale(2.1)">${ICO.qr}</div>
        <div style="text-align:center">
          <div style="font-size:42px;font-weight:600;color:${T.ink}">QRコードがある</div>
          <div style="font-size:20px;color:${T.sub};font-family:Inter,system-ui,sans-serif;margin-top:6px">I have a QR code</div>
        </div>
      </button>
      <button id="wel-form" style="width:560px;height:300px;border-radius:32px;border:none;background:${bc};display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;cursor:pointer">
        <div style="color:#fff;transform:scale(2.1)">${ICO.reception}</div>
        <div style="text-align:center">
          <div style="font-size:42px;font-weight:600;color:#fff">QRコードがない</div>
          <div style="font-size:20px;color:rgba(255,255,255,.8);font-family:Inter,system-ui,sans-serif;margin-top:6px">No QR code</div>
        </div>
      </button>
    </div>
  </div>
</div>`;
  rescale();
  let idleId;
  function resetIdle() { clearTimeout(idleId); idleId = setTimeout(() => { cleanup(); go("idle"); }, ST.kiosk_idle_timeout_sec * 1000); }
  CLEANUPS.push(() => clearTimeout(idleId));
  resetIdle();
  onSc("click", resetIdle);
  document.getElementById("wel-back").addEventListener("click", () => { cleanup(); go("top"); });
  document.getElementById("wel-qr").addEventListener("click", () => { cleanup(); go("qr"); });
  document.getElementById("wel-form").addEventListener("click", () => { cleanup(); go("reception"); });
}

// ─── RECEPTION MENU (受付メニュー) ────────────────────────────────────────────
// ご用件をお選びください: ご訪問 / 荷物の配達 / ロッカー
function showTop() {
  const bc = ST.brand_color;
  const TILES = [

// ─── RECEPTION FORM (OS標準ソフトキーボードを使用) ────────────────────────────
// 入力欄は上半分に2列配置＋送信ボタン。画面下半分はOSキーボード領域として空ける。
function showReception(initPurpose) {
  const bc = ST.brand_color;
  const STAFF_LIST = Array.isArray(ST.staff_list) ? ST.staff_list.filter(Boolean) : [];
  const PURPOSE_LIST = Array.isArray(ST.purpose_list) ? ST.purpose_list.filter(Boolean) : [];
  let submitting = false, errMsg = "";
  let form = { visitor_name: "", company: "", staff: "", purpose: initPurpose ?? "" };
  let idleId;
  function resetIdle() { clearTimeout(idleId); idleId = setTimeout(() => { cleanup(); go("idle"); }, ST.kiosk_idle_timeout_sec * 1000); }
  CLEANUPS.push(() => clearTimeout(idleId));
  resetIdle();

  const inputStyle = `width:100%;height:78px;background:${T.canvas};border:2px solid ${T.borderStrong};border-radius:14px;padding:0 22px;font-size:26px;color:${T.ink};outline:none;font-family:'Noto Sans JP',Inter,system-ui,sans-serif`;
  const selStyle = inputStyle + ";cursor:pointer";
  const fieldWrap = (ja, en, required, inner) => `
    <div style="display:flex;flex-direction:column;gap:10px">
      <div style="display:flex;align-items:baseline;gap:12px">
        <span style="font-size:24px;font-weight:600;color:${T.ink}">${ja}</span>
        <span style="font-size:15px;color:${T.muted};font-family:Inter,system-ui,sans-serif">${en}</span>
        ${required ? `<span style="font-size:14px;color:${T.urgent};background:${T.urgentBg};padding:2px 10px;border-radius:6px;font-weight:600">必須</span>` : ""}
      </div>
      ${inner}
    </div>`;

  function render() {
    const staffInner = STAFF_LIST.length
      ? `<select id="f-staff" style="${selStyle}"><option value="">選択してください</option>${STAFF_LIST.map(n => `<option value="${escHtml(n)}">${escHtml(n)}</option>`).join("")}</select>`
      : `<input id="f-staff" type="text" placeholder="担当者のお名前" style="${inputStyle}">`;
    const purposeInner = PURPOSE_LIST.length
      ? `<select id="f-purpose" style="${selStyle}"><option value="">選択してください</option>${PURPOSE_LIST.map(p => `<option value="${escHtml(p)}">${escHtml(p)}</option>`).join("")}</select>`
      : `<input id="f-purpose" type="text" placeholder="お打ち合わせ など" style="${inputStyle}">`;
    sc.innerHTML = `<div style="width:1920px;height:1080px;background:${T.bg};display:flex;flex-direction:column;font-family:'Noto Sans JP',Inter,system-ui,sans-serif">
  <div style="padding:28px 80px 0;flex-shrink:0">
    <button id="rec-back" style="display:inline-flex;align-items:center;gap:8px;padding:12px 24px;background:${T.canvas};border:1px solid ${T.borderStrong};border-radius:999px;font-size:18px;color:${T.sub};cursor:pointer">← 戻る</button>
  </div>
  <div style="padding:18px 80px 0;flex-shrink:0">
    <div style="font-size:52px;font-weight:600;color:${T.ink};letter-spacing:-1.4px;line-height:1.12">ご来訪情報をご記入ください</div>
    <div style="font-size:22px;color:${T.muted};font-family:Inter,system-ui,sans-serif;margin-top:6px">Please enter your visit details</div>
    ${errMsg ? `<div style="margin-top:18px;background:${T.urgentBg};border:1px solid rgba(168,66,56,.35);border-radius:12px;padding:14px 18px;color:${T.urgent};font-size:18px">${escHtml(errMsg)}</div>` : ""}
    <div style="margin-top:28px;display:grid;grid-template-columns:1fr 1fr;gap:24px 40px">
      ${fieldWrap("お名前", "Name", true, `<input id="f-name" type="text" autocomplete="name" placeholder="山田 太郎" style="${inputStyle}">`)}
      ${fieldWrap("会社名", "Company", false, `<input id="f-company" type="text" autocomplete="organization" placeholder="株式会社 〇〇" style="${inputStyle}">`)}
      ${fieldWrap("担当者名", "Host", false, staffInner)}
      ${fieldWrap("ご用件", "Purpose", false, purposeInner)}
    </div>
    <button id="rec-send" style="margin-top:30px;width:100%;height:88px;background:${submitting ? bc : T.dark};border:none;border-radius:16px;color:#fff;font-size:28px;font-weight:600;cursor:${submitting ? "not-allowed" : "pointer"};display:flex;align-items:center;justify-content:center;gap:12px;font-family:inherit">
      ${submitting ? `<div style="width:26px;height:26px;border-radius:50%;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;animation:spin .7s linear infinite"></div> 送信中…` : "受付する →"}
    </button>
  </div>
  <div style="flex:1;min-height:0"></div>
  <div style="padding:12px 80px 22px;display:flex;align-items:center;color:${T.muted};font-size:14px;flex-shrink:0">
    <span style="font-family:Inter,system-ui,sans-serif">入力欄をタッチするとキーボードが表示されます</span>
    <span style="flex:1"></span>
    <span style="font-family:'JetBrains Mono',monospace">${devName()}</span>
  </div>
</div>`;
    rescale();
    const g = id => document.getElementById(id);
    g("f-name").value = form.visitor_name;
    g("f-company").value = form.company;
    if (g("f-staff")) g("f-staff").value = form.staff;
    if (g("f-purpose")) g("f-purpose").value = form.purpose;
    g("rec-back").addEventListener("click", () => { cleanup(); go("welcome"); });
    const KEY = { "f-name": "visitor_name", "f-company": "company", "f-staff": "staff", "f-purpose": "purpose" };
    Object.keys(KEY).forEach(id => {
      const el = g(id); if (!el) return;
      const ev = el.tagName === "SELECT" ? "change" : "input";
      el.addEventListener(ev, () => { form[KEY[id]] = el.value; resetIdle(); });
      el.addEventListener("focus", resetIdle);
    });
    g("rec-send").addEventListener("click", handleSubmit);
    onSc("click", resetIdle);
  }

  async function handleSubmit() {
    if (submitting) return;
    if (!form.visitor_name.trim()) { errMsg = "お名前を入力してください"; render(); return; }
    const token = localStorage.getItem(TOKEN_KEY);
    if (!token) { cleanup(); showSetup(); return; }
    submitting = true; render();
    try {
      await apiPost("/proxy/reception", { visitor_name: form.visitor_name, company: form.company, purpose: form.purpose, staff: form.staff, method: "form" }, token);
      cleanup();
      go("calling", { name: form.visitor_name, staff: form.staff, method: "form" });
    } catch (e) {
      errMsg = e.message || "受付に失敗しました";
      submitting = false; render();
    }
  }

  render();
}

  function resetIdle() {
    clearTimeout(idleId); clearInterval(countId);
    let c = ST.kiosk_idle_timeout_sec;
    const update = () => {
      const cEl = document.getElementById("qr-cnt"), bEl = document.getElementById("qr-bar");
      const urgent = c <= 10, color = urgent ? T.urgent : bc;
      if (cEl) { cEl.textContent = c; cEl.style.color = color; }
      if (bEl) { bEl.style.width = `${(c / ST.kiosk_idle_timeout_sec) * 100}%`; bEl.style.background = color; }
      [document.getElementById("qr-cnt-lbl"), document.getElementById("qr-cnt-s")].forEach(el => { if (el) el.style.color = urgent ? T.urgent : T.muted; });
    };
    update();
    idleId = setTimeout(() => { stopStream(); cleanup(); go("idle"); }, ST.kiosk_idle_timeout_sec * 1000);
    countId = setInterval(() => { c--; if (c <= 0) { clearInterval(countId); return; } update(); }, 1000);
  }
  CLEANUPS.push(() => { clearTimeout(idleId); clearInterval(countId); stopStream(); });
  function stopStream() { scanning = false; stream?.getTracks().forEach(t => t.stop()); stream = null; }

  function camContent() {
    if (submitting) return `<div style="text-align:center;color:#fff"><div style="width:64px;height:64px;border-radius:50%;border:3px solid rgba(255,255,255,.2);border-top-color:${bc};animation:spin .8s linear infinite;margin:0 auto 20px"></div><div style="font-size:20px;opacity:.7">受付処理中…</div></div>`;
    const corners = [[0,0,0],[0,1,90],[1,1,180],[1,0,270]].map(([tb,lr,rot]) =>
      `<div style="position:absolute;${tb ? "bottom" : "top"}:-3px;${lr ? "right" : "left"}:-3px;width:60px;height:60px;transform:rotate(${rot}deg);border-top:5px solid ${bc};border-left:5px solid ${bc};border-radius:14px 0 0 0"></div>`
    ).join("");
    return `
<div style="position:absolute;inset:64px;border:3px dashed rgba(255,255,255,.2);border-radius:22px">${corners}${scanning ? `<div style="position:absolute;left:0;right:0;height:3px;background:${bc};box-shadow:0 0 24px ${bc};animation:scan-line 2s linear infinite"></div>` : ""}</div>
<video id="qr-vid" muted playsinline style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.85"></video>
<div style="position:absolute;bottom:24px;left:0;right:0;display:flex;justify-content:center"><span style="display:inline-flex;align-items:center;gap:8px;background:rgba(0,0,0,.5);color:#fff;padding:10px 22px;border-radius:999px;font-size:17px"><span style="width:8px;height:8px;border-radius:50%;background:${bc};animation:dot-pulse 1.4s ease-in-out infinite"></span>${scanning ? "読み取り中…" : "カメラ準備中…"}</span></div>`;
  }

  // カメラ位置を示す画像エリア(プレースホルダー)。実機のカメラ位置写真/図を qr_camera_image_url に設定すると差し替わる。
  const camGuide = ST.qr_camera_image_url
    ? `<img src="${escHtml(ST.qr_camera_image_url)}" style="width:100%;height:100%;object-fit:cover" alt="カメラ位置">`
    : `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:${T.muted};text-align:center;padding:12px"><div style="transform:scale(1.2);color:${bc}">${ICO.qr}</div><div style="font-size:14px;color:${T.sub};font-weight:600">カメラ位置</div></div>`;

  function render() {
    sc.innerHTML = `<div style="width:1920px;height:1080px;background:${T.bg};display:flex;flex-direction:column;font-family:'Noto Sans JP',Inter,system-ui,sans-serif">

  <div style="flex:1;padding:8px 80px 0;display:grid;grid-template-columns:1fr 1fr;gap:56px;align-items:center;min-height:0">
    <div id="cam-box" style="background:${T.dark};border-radius:28px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;height:100%;max-height:800px">${camContent()}</div>
    <div style="display:flex;flex-direction:column">
      <div style="font-size:64px;font-weight:600;color:${T.ink};letter-spacing:-2px;line-height:1.12;margin-bottom:8px">QRコードをかざしてください</div>
      <div style="font-size:22px;color:${T.muted};font-family:Inter,system-ui,sans-serif;margin-bottom:22px">Please hold your QR code over the camera</div>
      <div style="font-size:22px;color:${T.sub};line-height:1.6;margin-bottom:24px">メールでお送りした招待コードを<br>左の読み取り口へかざしてください</div>
      <div style="display:flex;align-items:center;gap:18px;background:${T.canvas};border:1px solid ${T.border};border-radius:18px;padding:16px 20px;margin-bottom:24px">
        <div style="width:128px;height:96px;border-radius:12px;overflow:hidden;background:${T.panel};border:1px solid ${T.border};display:flex;align-items:center;justify-content:center;flex-shrink:0">${camGuide}</div>
        <div><div style="font-size:20px;font-weight:600;color:${T.ink}">カメラはこちらの位置にあります</div><div style="font-size:15px;color:${T.muted};margin-top:4px">読み取り口の位置をご確認ください · Camera location</div></div>
      </div>
      ${errMsg ? `<div style="padding:16px 20px;background:${T.urgentBg};border:1px solid rgba(168,66,56,.3);border-radius:14px;color:${T.urgent};font-size:17px;line-height:1.6;margin-bottom:22px">${escHtml(errMsg)}</div>` : ""}
      <div style="display:flex;gap:14px">
        <button id="qr-form1" style="flex:1;padding:22px;background:${T.canvas};border:2px solid ${T.borderStrong};border-radius:14px;font-size:20px;font-weight:500;color:${T.ink};cursor:pointer">QRを持っていない</button>
        <button id="qr-form2" style="flex:1;padding:22px;background:${T.dark};border:2px solid ${T.dark};border-radius:14px;font-size:20px;font-weight:600;color:#fff;cursor:pointer">フォームで受付する →</button>
      </div>
    </div>
  </div>
  <div style="padding:16px 80px 28px;display:flex;align-items:center;color:${T.muted};font-size:14px;flex-shrink:0">
    <span id="qr-clk" style="font-family:'JetBrains Mono',monospace;font-size:16px"></span><span style="flex:1"></span>
    <div style="display:flex;align-items:center;gap:12px"><span id="qr-cnt-lbl">待機画面に戻るまで</span><span id="qr-cnt" style="font-size:22px;font-weight:700;font-family:'JetBrains Mono',monospace;color:${T.sub};min-width:40px;text-align:right;transition:color .3s">${ST.kiosk_idle_timeout_sec}</span><span id="qr-cnt-s">秒</span><div style="width:170px;height:6px;background:${T.border};border-radius:3px;overflow:hidden"><div id="qr-bar" style="width:100%;height:100%;background:${bc};border-radius:3px;transition:width 1s linear,background .3s"></div></div></div>
    <span style="flex:1"></span><span style="font-family:'JetBrains Mono',monospace">${devName()}</span>
  </div>
</div>`;
    rescale();

    document.getElementById("qr-form1").addEventListener("click", () => { stopStream(); cleanup(); go("reception"); });
    document.getElementById("qr-form2").addEventListener("click", () => { stopStream(); cleanup(); go("reception"); });
    onSc("click", resetIdle);
    if (stream) { const vid = document.getElementById("qr-vid"); if (vid) { vid.srcObject = stream; vid.play().catch(() => {}); } }
  }

  function refreshCam() {
    const box = document.getElementById("cam-box");
    if (!box) return;
    box.innerHTML = camContent();
    if (stream) { const vid = document.getElementById("qr-vid"); if (vid) { vid.srcObject = stream; vid.play().catch(() => {}); } }
  }

  async function startCamera() {
    try {
      stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } } });
      const vid = document.getElementById("qr-vid");
      if (vid) { vid.srcObject = stream; await vid.play(); }
      scanning = true; refreshCam(); scanLoop();
    } catch {
      errMsg = "カメラを起動できませんでした。アクセス許可を確認してください。"; render();
    }
  }

  let _qrCanvas = null, _qrCtx = null;
  async function scanLoop() {
    if (!scanning) return;
    const vid = document.getElementById("qr-vid");
    if (!vid || vid.readyState < 2) { if (scanning) requestAnimationFrame(scanLoop); return; }
    if (typeof BarcodeDetector !== "undefined") {
      try {
        const det = new BarcodeDetector({ formats: ["qr_code"] });
        const codes = await det.detect(vid);
        if (codes.length > 0 && codes[0].rawValue) { scanning = false; await handleQR(codes[0].rawValue); return; }
      } catch {}
    } else if (typeof jsQR !== "undefined") {
      if (!_qrCanvas) { _qrCanvas = document.createElement("canvas"); _qrCtx = _qrCanvas.getContext("2d", { willReadFrequently: true }); }
      _qrCanvas.width = vid.videoWidth || 640; _qrCanvas.height = vid.videoHeight || 480;
      _qrCtx.drawImage(vid, 0, 0);
      const imageData = _qrCtx.getImageData(0, 0, _qrCanvas.width, _qrCanvas.height);
      const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: "dontInvert" });
      if (code) { scanning = false; await handleQR(code.data); return; }
    }
    if (scanning) requestAnimationFrame(scanLoop);
  }

  async function handleQR(raw) {
    const token = localStorage.getItem(TOKEN_KEY);
    if (!token) { stopStream(); cleanup(); showSetup(); return; }

    if (raw.startsWith("appt:")) {
      const apptToken = raw.slice(5).trim();
      submitting = true; refreshCam();
      try {
        const appt = await apiGet("/proxy/appointment/" + encodeURIComponent(apptToken), token);
        await apiPost("/proxy/reception", {
          visitor_name: appt.visitor_name, company: appt.company || "", purpose: appt.purpose || "",
          staff: appt.staff || "", method: "appointment", appointment_id: appt.id,
        }, token);
        stopStream(); cleanup();
        go("calling", { name: appt.visitor_name, staff: appt.staff || "", room: appt.meeting_room || null, scheduledAt: appt.scheduled_at || null, method: "appointment" });
      } catch (e) {
        errMsg = e.message || "予約情報の取得に失敗しました"; submitting = false; scanning = true; render(); scanLoop();
      }
      return;
    }

    let name = "", company = "", purpose = "";
    try {
      const u = new URL(raw);
      name = u.searchParams.get("name") ?? ""; company = u.searchParams.get("company") ?? ""; purpose = u.searchParams.get("purpose") ?? "";
    } catch { name = raw.trim(); }
    if (!name) { errMsg = "QRコードから来訪者情報を読み取れませんでした。"; scanning = true; refreshCam(); scanLoop(); return; }
    submitting = true; refreshCam();
    try {
      await apiPost("/proxy/reception", { visitor_name: name, company, purpose, method: "qr" }, token);
      stopStream(); cleanup(); go("calling", { name, staff: "", method: "qr" });
    } catch (e) {
      errMsg = e.message || "受付処理に失敗しました"; submitting = false; scanning = true; render(); scanLoop();
    }
  }

  render();
  resetIdle();
  startCamera();
}

      ${soundRow('tap', 'タップ操作音', 'TAP SOUND', sounds.tap)}
      ${soundRow('chime', '呼び出しチャイム', 'CALL CHIME', sounds.chime)}
      ${soundRow('voice', '音声ガイダンス', 'VOICE GUIDANCE', sounds.voice)}
      <div style="margin-top:auto;display:flex;gap:14px;padding-top:20px">
        <button id="ks-test" style="flex:1.4;padding:18px;border-radius:14px;border:2px solid ${C.ash};background:${C.canvas};font-size:17px;font-weight:600;color:${C.ink};display:flex;align-items:center;justify-content:center;gap:10px;font-family:Inter,'Noto Sans JP',system-ui,sans-serif;cursor:pointer">${SVG.play} テスト音を再生</button>
        <button id="ks-mute" style="flex:1;padding:18px;border-radius:14px;border:2px solid ${C.ash};background:${C.paper};font-size:17px;font-weight:600;color:${C.graphite};font-family:Inter,'Noto Sans JP',system-ui,sans-serif;cursor:pointer">ミュート</button>
      </div>
    </div>

    <div style="background:${C.canvas};border:1px solid ${C.chalk};border-radius:22px;padding:36px 40px;display:flex;flex-direction:column;box-shadow:0 4px 24px rgba(29,26,21,.08);min-height:0">
      <div style="display:flex;align-items:center;gap:18px;margin-bottom:28px">
        <div style="width:56px;height:56px;border-radius:14px;background:${C.mossSoft};color:${C.mossDk};display:flex;align-items:center;justify-content:center">${SVG.wifi}</div>
        <div style="flex:1"><div style="font-size:28px;font-weight:600;color:${C.sumi};letter-spacing:-0.6px">Wi-Fi設定</div><div style="font-size:12px;color:${C.stone};letter-spacing:2.5px;margin-top:3px;font-family:ui-monospace,monospace">NETWORK / WI-FI</div></div>
        <div style="display:flex;align-items:center;gap:12px">
          <span id="ks-wifi-label" style="font-size:13px;font-weight:600;color:${wifiOn?C.mossDk:C.stone};font-family:ui-monospace,monospace">${wifiOn?'ON':'OFF'}</span>
          <div id="ks-wifi-toggle" style="cursor:pointer">${toggleEl(wifiOn)}</div>
        </div>
      </div>
      ${(()=>{
        const connected = networks.find(n => n.connected);
        if (wifiLoading) return `<div style="padding:20px;text-align:center;color:${C.stone};font-size:16px">スキャン中…</div>`;
        if (connected) return `<div style="background:${C.mossSoft};border:1.5px solid ${C.moss};border-radius:16px;padding:20px 24px;display:flex;align-items:center;gap:18px;margin-bottom:20px">
          ${barsWrap(connected.level, C.mossDk)}
          <div style="flex:1">
            <div style="font-size:22px;font-weight:600;color:${C.sumi};font-family:ui-monospace,monospace">${escHtml(connected.ssid)}</div>
            <div style="font-size:13px;color:${C.graphite};margin-top:4px">接続済み</div>
          </div>
          <div style="display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:999px;background:${C.canvas};color:${C.mossDk};font-size:13px;font-weight:600">
            ${SVG.check} 接続中
          </div>
        </div>`;
        return `<div style="background:${C.paper};border:1.5px solid ${C.chalk};border-radius:16px;padding:20px 24px;color:${C.stone};font-size:16px;margin-bottom:20px">未接続</div>`;
      })()}
      <div style="font-size:12px;color:${C.stone};letter-spacing:2px;margin:0 0 6px;font-family:ui-monospace,monospace">その他のネットワーク · OTHER NETWORKS</div>
      <div style="flex:1;overflow-y:auto;min-height:0">
        ${networks.filter(n=>!n.connected).map((n,i) => `<div data-net="${i}" style="display:flex;align-items:center;gap:18px;padding:15px 4px;border-bottom:1px solid ${C.chalk};cursor:pointer">
          ${barsWrap(n.level)}
          <div style="flex:1;font-size:19px;font-weight:500;color:${C.ink};font-family:ui-monospace,monospace">${escHtml(n.ssid)}</div>
          ${n.lock?`<span style="color:${C.stone}">${SVG.lock}</span>`:''}
          <span style="color:${C.stone}">${SVG.chevron}</span>
        </div>`).join('')}
        ${networks.length===0&&!wifiLoading?`<div style="padding:20px;color:${C.stone};font-size:16px">ネットワークが見つかりません</div>`:''}
      </div>
      <div style="padding-top:20px">
        <button id="ks-rescan" style="width:100%;padding:18px;border-radius:14px;border:2px solid ${C.ash};background:${C.canvas};font-size:17px;font-weight:600;color:${C.ink};font-family:Inter,'Noto Sans JP',system-ui,sans-serif;cursor:pointer">
          ネットワークを再検索 · RESCAN
        </button>
      </div>
    </div>

  </div>

  <div style="display:flex;align-items:center;padding:20px 80px 28px;font-size:14px;color:${C.stone}">
    設定の変更はスタッフのみ操作できます
    <span style="flex:1"></span>
    <span id="ks-dev" style="font-family:ui-monospace,monospace;cursor:default" title="">${devName} · FW v2.4.1</span>
  </div>
</div>`;
    rescale();
    bindEvents();
  }

  function updateVol() {
    const pct   = document.getElementById("ks-vol-pct");
    const fill  = document.getElementById("ks-vol-fill");
    const thumb = document.getElementById("ks-vol-thumb");
    if (pct)   pct.textContent = vol + "%";
    if (fill)  fill.style.width = vol + "%";
    if (thumb) thumb.style.left = vol + "%";
    clearTimeout(volDebounce);
    volDebounce = setTimeout(postVolume, 400);
  }

  async function postVolume() {
    try {
      const resp = await fetch("/device/volume", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({level: vol}),
      });
      if (!resp.ok) {
        const d = await resp.json().catch(() => ({}));
        console.warn("[kiosk] volume set failed:", d.detail);
      }
    } catch(e) { console.warn("[kiosk] volume set error:", e); }
  }

  function showWifiPasswordDialog(net) {
    const overlay = document.createElement("div");
    overlay.style.cssText = `position:absolute;inset:0;background:rgba(29,26,21,.6);display:flex;align-items:center;justify-content:center;z-index:99`;
    overlay.innerHTML = `<div style="background:#fffefb;border-radius:20px;padding:48px 56px;width:640px;box-shadow:0 24px 64px rgba(0,0,0,.3)">
      <div style="font-size:24px;font-weight:600;color:#1d1a15;margin-bottom:6px">${escHtml(net.ssid)}</div>
      <div style="font-size:14px;color:#8a8276;margin-bottom:28px">パスワードを入力してください</div>
      <input id="ks-pw-input" type="password" placeholder="Wi-Fiパスワード"
        style="width:100%;padding:16px 18px;border-radius:12px;border:2px solid #d4cfc7;background:#f5f3ee;font-size:20px;font-family:ui-monospace,monospace;outline:none;margin-bottom:8px;box-sizing:border-box">
      <div id="ks-pw-err" style="font-size:13px;color:#c0392b;min-height:20px;margin-bottom:16px"></div>
      <div style="display:flex;gap:14px">
        <button id="ks-pw-cancel" style="flex:1;padding:16px;border-radius:12px;border:2px solid #d4cfc7;background:transparent;font-size:16px;color:#5a5249;cursor:pointer;font-family:inherit">キャンセル</button>
        <button id="ks-pw-ok" style="flex:1;padding:16px;border-radius:12px;border:none;background:#4a7c4e;color:#fffefb;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit">接続する</button>
      </div>
    </div>`;
    document.getElementById("ks-root").appendChild(overlay);
    const input  = document.getElementById("ks-pw-input");
    const errDiv = document.getElementById("ks-pw-err");
    const okBtn  = document.getElementById("ks-pw-ok");
    input.focus();
    document.getElementById("ks-pw-cancel").addEventListener("click", () => overlay.remove());
    async function doConnect() {
      okBtn.disabled = true; okBtn.textContent = "接続中…";
      errDiv.textContent = "";
      try {
        const resp = await fetch("/device/wifi/connect", {
          method: "POST",
          headers: {"Content-Type":"application/json"},
          body: JSON.stringify({ssid: net.ssid, password: input.value}),
        });
        if (!resp.ok) {
          const data = await resp.json().catch(() => ({}));
          errDiv.textContent = data.detail ?? "接続に失敗しました";
          okBtn.disabled = false; okBtn.textContent = "接続する";
        } else {
          overlay.remove();
          await loadNetworks();
        }
      } catch(e) {
        errDiv.textContent = "通信エラーが発生しました";
        okBtn.disabled = false; okBtn.textContent = "接続する";
      }
    }
    okBtn.addEventListener("click", doConnect);
    input.addEventListener("keydown", e => { if (e.key === "Enter") doConnect(); });
  }

  async function loadNetworks() {
    wifiLoading = true; render();
    try {
      const data = await fetch("/device/wifi/networks").then(r => r.json());
      networks = data.networks ?? [];
    } catch(e) { networks = []; }
    wifiLoading = false; render();
  }

  function bindEvents() {
    document.getElementById("ks-back").addEventListener("click", () => go("idle"));

    document.getElementById("ks-vol-minus").addEventListener("click", () => {
      vol = Math.max(0, vol - 5); updateVol();
    });
    document.getElementById("ks-vol-plus").addEventListener("click", () => {
      vol = Math.min(100, vol + 5); updateVol();
    });

    const track = document.getElementById("ks-vol-track");
    function volFromPointer(clientX) {
      const r = track.getBoundingClientRect();
      vol = Math.round(Math.max(0, Math.min(100, (clientX - r.left) / r.width * 100)));
      updateVol();
    }
    track.addEventListener("mousedown", e => {
      volFromPointer(e.clientX);
      function mm(e2) { volFromPointer(e2.clientX); }
      document.addEventListener("mousemove", mm);
      document.addEventListener("mouseup", () => document.removeEventListener("mousemove", mm), { once:true });
    });
    track.addEventListener("touchstart", e => volFromPointer(e.touches[0].clientX), { passive:true });
    track.addEventListener("touchmove",  e => volFromPointer(e.touches[0].clientX), { passive:true });

    document.querySelectorAll("[data-sound]").forEach(row => {
      row.addEventListener("click", () => {
        const k = row.getAttribute("data-sound");
        sounds[k] = !sounds[k];
        localStorage.setItem("kiosk_snd_" + k, sounds[k] ? "on" : "off");
        render();
      });
    });

    document.getElementById("ks-test").addEventListener("click", () => {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator(), gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = "sine"; osc.frequency.value = 880;
        gain.gain.setValueAtTime(0, ctx.currentTime);
        gain.gain.linearRampToValueAtTime(0.3 * vol / 100, ctx.currentTime + 0.05);
        gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.6);
        osc.start(ctx.currentTime); osc.stop(ctx.currentTime + 0.65);
      } catch(e) {}
    });

    document.getElementById("ks-mute").addEventListener("click", () => {
      vol = vol > 0 ? 0 : 70; updateVol();
    });

    document.getElementById("ks-wifi-toggle").addEventListener("click", async () => {
      wifiOn = !wifiOn;
      render();
      try {
        await fetch("/device/wifi/toggle", {
          method: "POST",
          headers: {"Content-Type":"application/json"},
          body: JSON.stringify({on: wifiOn}),
        });
        if (wifiOn) await loadNetworks();
      } catch(e) {}
    });

    document.getElementById("ks-rescan").addEventListener("click", () => loadNetworks());

    // Network row clicks
    const otherNets = networks.filter(n => !n.connected);
    document.querySelectorAll("[data-net]").forEach(row => {
      row.addEventListener("click", async () => {
        const idx = parseInt(row.getAttribute("data-net"));
        const net = otherNets[idx];
        if (!net) return;
        if (net.lock) {
          showWifiPasswordDialog(net);
        } else {
          row.style.opacity = "0.5";
          try {
            await fetch("/device/wifi/connect", {
              method: "POST",
              headers: {"Content-Type":"application/json"},
              body: JSON.stringify({ssid: net.ssid, password: ""}),
            });
            await loadNetworks();
          } catch(e) { row.style.opacity = "1"; }
        }
      });
    });

    // 5 taps on device info → re-register
    document.getElementById("ks-dev").addEventListener("click", () => {
      devTaps++;
      clearTimeout(devTimer);
      if (devTaps >= 5) {
        devTaps = 0;
        const overlay = document.createElement("div");
        overlay.style.cssText = `position:absolute;inset:0;background:rgba(29,26,21,.6);display:flex;align-items:center;justify-content:center;z-index:99`;
        overlay.innerHTML = `<div style="background:#fffefb;border-radius:20px;padding:48px 56px;width:520px;text-align:center;box-shadow:0 24px 64px rgba(0,0,0,.3)">
          <div style="font-size:28px;font-weight:600;color:#1d1a15;margin-bottom:12px">デバイスを再登録しますか？</div>
          <div style="font-size:16px;color:#8a8276;margin-bottom:36px">現在のセッションがリセットされます</div>
          <div style="display:flex;gap:14px">
            <button id="ks-rereg-cancel" style="flex:1;padding:16px;border-radius:12px;border:2px solid #d4cfc7;background:transparent;font-size:16px;color:#5a5249;cursor:pointer;font-family:inherit">キャンセル</button>
            <button id="ks-rereg-ok" style="flex:1;padding:16px;border-radius:12px;border:none;background:#4a7c4e;color:#fffefb;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit">再登録する</button>
          </div>
        </div>`;
        document.getElementById("ks-root").appendChild(overlay);
        document.getElementById("ks-rereg-cancel").addEventListener("click", () => overlay.remove());
        document.getElementById("ks-rereg-ok").addEventListener("click", () => {
          localStorage.removeItem(TOKEN_KEY);
          localStorage.removeItem(NAME_KEY);
          cleanup();
          showSetup();
        });
      } else {
        devTimer = setTimeout(() => { devTaps = 0; }, 3000);
      }
    });
  }

  // Initial load: fetch volume + wifi from backend, then render
  async function init() {
    const [volRes, wifiRes] = await Promise.allSettled([
      fetch("/device/volume").then(r => r.json()),
      fetch("/device/wifi/networks").then(r => r.json()),
    ]);
    if (volRes.status === "fulfilled") {
      vol = volRes.value.level ?? 70;
      if (volRes.value.error) console.warn("[kiosk] volume:", volRes.value.error);
    }
    if (wifiRes.status === "fulfilled") {
      networks = wifiRes.value.networks ?? [];
      if (wifiRes.value.error) console.warn("[kiosk] wifi:", wifiRes.value.error);
    }
    render();
  }

  init();
}

// ─── Corner gesture: simultaneous top-left + top-right touch → kiosk settings ─
(function() {
  let lastTriggered = 0;
  document.addEventListener("touchstart", function(e) {
    if (CURRENT_SCREEN === "kiosk-settings") return;
    const now = Date.now();
    if (now - lastTriggered < 2000) return;
    const touches = Array.from(e.touches);
    if (touches.length < 2) return;
    const W = window.innerWidth, EDGE = 160, TOP = 130;
    const hasTL = touches.some(t => t.clientX < EDGE && t.clientY < TOP);
    const hasTR = touches.some(t => t.clientX > W - EDGE && t.clientY < TOP);
    if (hasTL && hasTR) {
      lastTriggered = now;
      showKioskSettings();
    }
  }, { passive: true });
})();

// Ctrl+Shift+M → kiosk settings
document.addEventListener("keydown", function(e) {
  if (e.ctrlKey && e.shiftKey && e.key === "M" && CURRENT_SCREEN !== "kiosk-settings") {
    showKioskSettings();
  }
});

// ─── Boot ─────────────────────────────────────────────────────────────────────
async function boot() {
  sc.innerHTML = `<div style="width:1920px;height:1080px;background:#0a0806;display:flex;align-items:center;justify-content:center"><div style="color:rgba(255,255,255,.3);font-size:18px">読み込み中…</div></div>`;
  rescale();

  try {
    CFG = await apiGet("/config");
  } catch (e) {
    sc.innerHTML = `<div style="width:1920px;height:1080px;background:#0a0806;display:flex;align-items:center;justify-content:center"><div style="color:#f88;font-size:16px;text-align:center">エージェントに接続できません<br>${escHtml(e.message)}</div></div>`;
    rescale(); return;
  }

  const token = localStorage.getItem(TOKEN_KEY);
  if (!token) { showSetup(); return; }

  // Load settings + schedule in parallel
  try {
    const [settings, sched] = await Promise.all([
      apiGet("/proxy/settings").catch(() => null),
      apiGet("/proxy/schedule", token).catch(e => {
        if (e.message === "Invalid kiosk token") {
          localStorage.removeItem(TOKEN_KEY); localStorage.removeItem(NAME_KEY);
        }
        return null;
      }),
    ]);
    if (!localStorage.getItem(TOKEN_KEY)) { showSetup(); return; }
    if (settings) Object.assign(ST, settings);
    if (sched?.suspended) {
      showSuspended();
    } else {
      ITEMS = sched?.playlist?.items ?? [];
      TRANSITION_TYPE = sched?.playlist?.transition_type ?? "fade";
      go("idle");
    }
  } catch {
    go("idle");
  }

  // Poll schedule every 60 s
  setInterval(async () => {
    const t = localStorage.getItem(TOKEN_KEY);
    if (!t) return;
    try {
      const s = await apiGet("/proxy/schedule", t);
      if (s?.suspended) {
        if (CURRENT_SCREEN !== "suspended") showSuspended();
      } else {
        if (CURRENT_SCREEN === "suspended") { ITEMS = s?.playlist?.items ?? []; TRANSITION_TYPE = s?.playlist?.transition_type ?? "fade"; go("idle"); }
        else { ITEMS = s?.playlist?.items ?? []; TRANSITION_TYPE = s?.playlist?.transition_type ?? "fade"; }
      }
    } catch {}
  }, 60000);

  // Poll /update-status every 30 s; apply when idle or force-flagged
  setInterval(async () => {
    try {
      const s = await fetch("/update-status").then(r => r.json());
      if (!s.ready) return;
      if (!s.force && CURRENT_SCREEN !== "idle") return;
      await fetch("/apply-update", { method: "POST" });
      setTimeout(() => location.reload(), 500);
    } catch {}
  }, 30000);
}

boot();
</script>
