<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>mokuture+</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{width:100vw;height:100vh;overflow:hidden;background:#0a0806;font-family:'Noto Sans JP',Inter,system-ui,sans-serif}
#sw{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
#sc{width:1920px;height:1080px;transform-origin:center center;overflow:hidden;position:relative}
button{font-family:inherit}

@keyframes fade-in{from{opacity:0}to{opacity:1}}
@keyframes ring-expand{0%{transform:scale(1);opacity:.4}100%{transform:scale(2.2);opacity:0}}
@keyframes cursor-blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes check-draw{to{stroke-dashoffset:0}}
@keyframes scan-line{0%{top:4px}100%{top:calc(100% - 4px)}}
@keyframes dot-pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.7)}}
@keyframes dot-bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes scale-in{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
</style>

<body>
<div id="sw"><div id="sc"></div></div>
<script>
// ─── State ────────────────────────────────────────────────────────────────────
let CFG = { tenant_slug: "", remote_api_url: "", device_name: "" };
let ST = {
  brand_color: "#4a7c4e",
  kiosk_welcome_message: "ようこそ",
  kiosk_sub_message: "ご用件をお選びください",
  kiosk_calling_message: "担当者をお呼びしています",
  kiosk_complete_message: "担当者がご案内します",

  kiosk_complete_timeout_sec: 10,

let CLEANUPS = [];

const sc = document.getElementById("sc");
const TOKEN_KEY = "mokuture_kiosk_token";

// ─── Scale ────────────────────────────────────────────────────────────────────
function rescale() {
  sc.style.transform = `scale(${Math.min(innerWidth / 1920, innerHeight / 1080)})`;
}
window.addEventListener("resize", rescale);
rescale();

// ─── Cleanup helpers ─────────────────────────────────────────────────────────
function later(ms, fn) {
  const id = setTimeout(fn, ms);
  CLEANUPS.push(() => clearTimeout(id));
}
function every(ms, fn) {
  const id = setInterval(fn, ms);
  CLEANUPS.push(() => clearInterval(id));
  return id;
}
function onSc(event, fn) {
  sc.addEventListener(event, fn);
  CLEANUPS.push(() => sc.removeEventListener(event, fn));
}
function cleanup() { CLEANUPS.forEach(f => f()); CLEANUPS = []; }

// ─── API helpers ─────────────────────────────────────────────────────────────
async function apiFetch(method, path, body, token) {
  const h = { "Content-Type": "application/json" };
  if (token) h["X-Kiosk-Token"] = token;
  const r = await fetch(path, {
    method,
    headers: h,
    body: body != null ? JSON.stringify(body) : undefined,
  });
  if (!r.ok) {
    const e = await r.json().catch(() => ({ detail: r.statusText }));
    throw new Error(e.detail ?? "Request failed");
  }
  return r.status === 204 ? null : r.json();
}
const apiGet  = (p, tok)    => apiFetch("GET",  p, null, tok);
const apiPost = (p, b, tok) => apiFetch("POST", p, b,    tok);

// ─── Clock ────────────────────────────────────────────────────────────────────
function fmtClock() {
  const d = new Date();
  return `${d.getFullYear()}.${pad(d.getMonth()+1)}.${pad(d.getDate())} · ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function pad(n) { return String(n).padStart(2, "0"); }
function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// ─── Romaji → Kana ───────────────────────────────────────────────────────────
const RM = {
  "a":"あ","i":"い","u":"う","e":"え","o":"お",
  "ka":"か","ki":"き","ku":"く","ke":"け","ko":"こ","kya":"きゃ","kyu":"きゅ","kyo":"きょ",
  "sa":"さ","si":"し","su":"す","se":"せ","so":"そ","shi":"し","sha":"しゃ","shu":"しゅ","sho":"しょ","sya":"しゃ","syu":"しゅ","syo":"しょ",
  "ta":"た","ti":"ち","tu":"つ","te":"て","to":"と","chi":"ち","tsu":"つ","cha":"ちゃ","chu":"ちゅ","cho":"ちょ","tya":"ちゃ","tyu":"ちゅ","tyo":"ちょ",
  "na":"な","ni":"に","nu":"ぬ","ne":"ね","no":"の","nya":"にゃ","nyu":"にゅ","nyo":"にょ","nn":"ん",
  "ha":"は","hi":"ひ","hu":"ふ","fu":"ふ","he":"へ","ho":"ほ","hya":"ひゃ","hyu":"ひゅ","hyo":"ひょ",
  "ma":"ま","mi":"み","mu":"む","me":"め","mo":"も","mya":"みゃ","myu":"みゅ","myo":"みょ",
  "ya":"や","yu":"ゆ","yo":"よ",
  "ra":"ら","ri":"り","ru":"る","re":"れ","ro":"ろ","rya":"りゃ","ryu":"りゅ","ryo":"りょ",
  "wa":"わ","wo":"を",
  "ga":"が","gi":"ぎ","gu":"ぐ","ge":"げ","go":"ご","gya":"ぎゃ","gyu":"ぎゅ","gyo":"ぎょ",
  "za":"ざ","zi":"じ","zu":"ず","ze":"ぜ","zo":"ぞ","ji":"じ","ja":"じゃ","ju":"じゅ","jo":"じょ","zya":"じゃ","zyu":"じゅ","zyo":"じょ",
  "da":"だ","di":"ぢ","du":"づ","de":"で","do":"ど",
  "ba":"ば","bi":"び","bu":"ぶ","be":"べ","bo":"ぼ","bya":"びゃ","byu":"びゅ","byo":"びょ",
  "pa":"ぱ","pi":"ぴ","pu":"ぷ","pe":"ぺ","po":"ぽ","pya":"ぴゃ","pyu":"ぴゅ","pyo":"ぴょ",
  "xa":"ぁ","xi":"ぃ","xu":"ぅ","xe":"ぇ","xo":"ぉ","xya":"ゃ","xyu":"ゅ","xyo":"ょ","xtsu":"っ","xtu":"っ",
  "-":"ー",
};
const RP = new Set(Object.keys(RM).flatMap(k => Array.from({length:k.length}, (_, i) => k.slice(0, i+1))));
const VOWELS = new Set(["a","i","u","e","o"]);

function cvt(buf, ch) {
  const c = buf + ch;
  if (buf === "n" && !VOWELS.has(ch) && ch !== "y" && ch !== "n") {
    const r = cvt("", ch); return { out: "ん" + r.out, buf: r.buf };
  }
  if (buf.length > 0 && ch === buf[buf.length-1] && !VOWELS.has(ch) && ch !== "n") {
    const r = cvt("", ch); return { out: "っ" + r.out, buf: r.buf };
  }
  if (RM[c] !== undefined) return { out: RM[c], buf: "" };
  if (RP.has(c))           return { out: "",    buf: c  };
  if (RP.has(ch))          return { out: buf,   buf: ch };
  if (RM[ch] !== undefined) return { out: buf + RM[ch], buf: "" };
  return { out: c, buf: "" };
}

// ─── SVG icons ───────────────────────────────────────────────────────────────
const ICO = {

  more:      `<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>`,
  arrow:     `<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>`,
  bell_sm:   `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0v5l2 3H4l2-3z"/><path d="M10 19a2 2 0 0 0 4 0"/></svg>`,
  bell_lg:   `<svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0v5l2 3H4l2-3z"/><path d="M10 19a2 2 0 0 0 4 0"/></svg>`,
  check_sm:  `<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 6"/></svg>`,
  check_lg:  `<svg width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 6" stroke-dasharray="60" stroke-dashoffset="60" style="animation:check-draw .6s .3s cubic-bezier(.2,.9,.3,1) forwards"/></svg>`,
  arrow_lg:  `<svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>`,
  clock:     `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>`,
};

// ─── Navigate ─────────────────────────────────────────────────────────────────
function go(screen, data = {}) {
  CURRENT_SCREEN = screen;
  cleanup();
  sc.style.animation = "none";
  sc.offsetHeight; // reflow
  sc.style.animation = "fade-in .18s ease-out";
  if      (screen === "idle")      showIdle();
  else if (screen === "top")       showTop();
  else if (screen === "reception") showReception(data.purpose ?? "");
  else if (screen === "qr")        showQr();
  else if (screen === "calling")   showCalling(data.name ?? "", data.staff ?? "");
  else if (screen === "complete")  showComplete(data.name ?? "", data.staff ?? "");
}

// ─── SETUP ───────────────────────────────────────────────────────────────────
function showSetup() {
  let pin = "", verifying = false;

  function render(errMsg) {
    const dots = Array.from({length: 6}, (_, i) => {
      const on = i < pin.length;
      return `<div style="width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;border:1px solid ${on?"#4a7c4e":"#3a3530"};background:${on?"#4a7c4e":"#2a2720"};color:#faf8f4">${on?"●":""}</div>`;
    }).join("");

    const PAD = ["1","2","3","4","5","6","7","8","9","⌫","0","→"];
    const padHtml = PAD.map(k => {
      const isConfirm = k === "→";
      const isDisabled = verifying || (isConfirm && pin.length < 6);
      return `<button data-pk="${escHtml(k)}" style="height:64px;border-radius:16px;font-size:${k.length>1?14:20}px;font-weight:600;cursor:${isDisabled?"not-allowed":"pointer"};border:1px solid ${isConfirm?"#4a7c4e":"#3a3530"};background:${isConfirm?"#4a7c4e":"#2a2720"};color:${isConfirm?"#faf8f4":"#c8c0b0"};opacity:${isDisabled?.35:1};transition:opacity .15s">${isConfirm?"決定":k}</button>`;
    }).join("");

    sc.innerHTML = `
<div style="width:1920px;height:1080px;background:#1d1a15;display:flex;align-items:center;justify-content:center">
  <div style="display:flex;flex-direction:column;align-items:center;gap:32px;width:320px">
    <div style="text-align:center">
      <p style="color:#faf8f4;font-size:24px;font-weight:300;letter-spacing:6px">mokuture+</p>
      <p style="color:#8a8070;font-size:14px;margin-top:6px">キオスク端末セットアップ</p>
    </div>
    <div style="display:flex;gap:12px">${dots}</div>
    ${errMsg ? `<div style="width:100%;padding:12px 16px;background:rgba(200,60,60,.2);border:1px solid rgba(200,60,60,.4);border-radius:10px;color:#f88;font-size:13px;text-align:center">${escHtml(errMsg)}</div>` : ""}
    ${verifying ? `<p style="color:#8a8070;font-size:14px;animation:dot-pulse 1.4s ease-in-out infinite">確認中…</p>` : ""}
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%">${padHtml}</div>
    <p style="color:#5a5347;font-size:11px;text-align:center">管理画面「キオスク端末」→「端末を追加」でPINを発行</p>
  </div>
</div>`;
    rescale();

    sc.querySelectorAll("[data-pk]").forEach(btn => {
      btn.addEventListener("click", () => handleKey(btn.dataset.pk));
    });
  }

  async function verifyPin(code) {
    verifying = true;
    render("");
    try {
      const data = await apiPost("/setup", { pin_code: code });
      localStorage.setItem(TOKEN_KEY, data.device_token);
      localStorage.setItem(NAME_KEY, data.device_name);
      cleanup();
      await boot();
    } catch (e) {
      verifying = false;
      pin = "";
      render("PINが無効です。管理画面で新しいPINを発行してください。");
    }
  }

  function handleKey(key) {
    if (verifying) return;
    if (key === "⌫") { pin = pin.slice(0, -1); render(""); }
    else if (key === "→") { if (pin.length === 6) verifyPin(pin); }
    else if (pin.length < 6) {
      pin += key;
      render("");
      if (pin.length === 6) verifyPin(pin);
    }
  }

  render("");
}

// ─── IDLE ─────────────────────────────────────────────────────────────────────
function showIdle() {
  const bc = ST.brand_color;
  const builder = IDLE_TEMPLATES[ST.kiosk_style] ?? IDLE_TEMPLATES.default;

  sc.innerHTML = `<div id="idle-root" style="width:1920px;height:1080px;position:relative;overflow:hidden;cursor:pointer;user-select:none">${builder(bc)}</div>`;
  rescale();

  const root = document.getElementById("idle-root");
  onSc("click", () => { cleanup(); go("top"); });

  if (ITEMS.length === 0) return;

  let idx = 0;

  function showItem() {
    const old = root.querySelector(".media-el");
    if (old) old.remove();

    const item = ITEMS[idx];
    if (!item?.media) { later(3000, nextItem); return; }

    const url = `/media/${item.media.id}`;
    if (item.media.mime_type === "video/mp4") {
      const v = document.createElement("video");
      v.className = "media-el";
      v.src = url;
      v.autoplay = v.muted = v.playsInline = true;
      v.loop = ITEMS.length === 1;
      v.style.cssText = "position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0";
      v.onended = nextItem;
      v.onerror = nextItem;
      root.insertBefore(v, root.querySelector("[style*='z-index:10']"));
      v.play().catch(() => {});
    } else {
      const img = document.createElement("img");
      img.className = "media-el";
      img.src = url;
      img.alt = "";
      img.style.cssText = "position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0";
      img.onerror = nextItem;
      root.insertBefore(img, root.querySelector("[style*='z-index:10']"));
      later(item.duration_sec * 1000, nextItem);
    }
  }

  function nextItem() {
    idx = (idx + 1) % ITEMS.length;
    showItem();
  }

  showItem();
}

function showTop() {
  const bc = ST.brand_color;
  const devName = escHtml(localStorage.getItem(NAME_KEY) ?? "kiosk");

  const TILES = [
    { icon: ICO.reception, label: "ご訪問",      sub: "お約束の方",            primary: true, screen: "reception", data: {purpose:""} },
    { icon: ICO.qr,        label: "QRで受付",    sub: "招待コードをお持ちの方",              screen: "qr",        data: {} },
    { icon: ICO.truck,     label: "配送・宅配便", sub: "お荷物のお届け",                     screen: "reception", data: {purpose:"配送・宅配便"} },
    { icon: ICO.more,      label: "その他",       sub: "上記以外のご用件",                   screen: "reception", data: {purpose:"その他"} },
  ];

  const builder = TOP_TEMPLATES[ST.kiosk_style] ?? TOP_TEMPLATES.default;
  sc.innerHTML = builder(ST, TILES, bc, devName);
  rescale();

  document.getElementById("top-clk").textContent = fmtClock();
  every(30000, () => { const c = document.getElementById("top-clk"); if (c) c.textContent = fmtClock(); });

  let idleId, countId;
  function resetIdle() {
    clearTimeout(idleId);
    clearInterval(countId);
    let c = ST.kiosk_idle_timeout_sec;
    const update = () => {
      const cEl = document.getElementById("top-cnt");
      const bEl = document.getElementById("top-bar");
      const urgent = c <= 10;
      const color = urgent ? "#a84238" : "#6b6559";
      if (cEl) { cEl.textContent = c; cEl.style.color = color; }
      if (bEl) { bEl.style.width = `${(c / ST.kiosk_idle_timeout_sec) * 100}%`; bEl.style.background = color; }
      [document.getElementById("top-cnt-lbl"), document.getElementById("top-cnt-s")].forEach(el => { if (el) el.style.color = urgent ? "#a84238" : "#a8a198"; });
    };
    update();
    idleId = setTimeout(() => { cleanup(); go("idle"); }, ST.kiosk_idle_timeout_sec * 1000);
    countId = setInterval(() => { c--; if (c <= 0) { clearInterval(countId); return; } update(); }, 1000);
  }
  CLEANUPS.push(() => { clearTimeout(idleId); clearInterval(countId); });
  resetIdle();
  onSc("click", resetIdle);

  document.getElementById("tiles").addEventListener("click", e => {
    const btn = e.target.closest("[data-ti]");
    if (!btn) return;
    resetIdle();
    const t = TILES[+btn.dataset.ti];
    btn.style.transform = "scale(.97)";
    later(160, () => { cleanup(); go(t.screen, t.data); });
  });
}

          </div>

        </div>`;
      }
      // Free-text mode (no list, or "その他" selected)
      const focused = focus === f.key;
      const disp = form[f.key] + (focused && isKana ? rbuf : "");
      return `<div>

          ${USE_PURPOSE_DROPDOWN ? `<button id="purpose-back-btn" style="font-size:12px;padding:4px 10px;border-radius:999px;border:1px solid ${th.border};background:transparent;color:${th.sub};cursor:pointer">← リストに戻る</button>` : ""}
        </div>
        <div data-field="${f.key}" style="background:${th.card};border:2px solid ${focused?th.accent:(form[f.key]?th.accent:th.border)};border-radius:11px;padding:14px 20px;font-size:20px;color:${disp?th.text:th.muted};box-shadow:${focused?"0 0 0 4px "+th.accent+"33":"none"};cursor:default;min-height:56px;display:flex;align-items:center;transition:border-color .15s,box-shadow .15s">

      ${errMsg ? `<div style="margin-bottom:14px;background:${th.urgentBg};border:1px solid rgba(168,66,56,.35);border-radius:12px;padding:12px 16px;color:${th.urgent};font-size:15px">${escHtml(errMsg)}</div>` : ""}

      </div>
    </div>
    <div style="display:flex;flex-direction:column;justify-content:flex-end;min-height:0;padding-bottom:24px">
      <div style="background:${th.kbd};border-radius:18px;padding:12px;border:1px solid ${th.kbdBorder}">

          <button id="kana-btn" style="flex:2;height:62px;background:${isKana?th.sendBg:th.card};border:1px solid ${th.kbdBorder};border-radius:9px;font-size:13px;color:${isKana?"#fff":th.sub};cursor:pointer;user-select:none;transition:background .1s,color .1s">かな / ABC</button>
          <button data-key="space" style="flex:5;height:62px;background:${th.card};border:1px solid ${th.kbdBorder};border-radius:9px;cursor:pointer;user-select:none"></button>
          <button id="send-btn" style="flex:2;height:62px;background:${submitting?th.sendActive:th.sendBg};border-radius:9px;border:none;display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;font-weight:600;cursor:${submitting?"not-allowed":"pointer"};user-select:none">
            ${submitting ? `<div style="width:22px;height:22px;border-radius:50%;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;animation:spin .7s linear infinite"></div>` : "送信 →"}

  function attachEvents() {
    document.getElementById("rec-back").addEventListener("click", () => { cleanup(); go("top"); });

    // Staff dropdown: name buttons
    sc.querySelectorAll("[data-staff-name]").forEach(btn => {
      const handler = e => {
        e.preventDefault(); resetIdle();
        form.staff = btn.dataset.staffName;
        fullRender();
      };
      btn.addEventListener("click", handler);
      btn.addEventListener("touchstart", handler, { passive: false });
    });

    // Staff dropdown: "直接入力..." button
    const ftBtn = document.getElementById("staff-freetext-btn");
    if (ftBtn) {
      const handler = e => {
        e.preventDefault(); resetIdle();
        staffMode = "freetext";
        focus = "staff";
        form.staff = "";
        fullRender();
      };
      ftBtn.addEventListener("click", handler);
      ftBtn.addEventListener("touchstart", handler, { passive: false });
    }

    // Staff free-text: "← リストに戻る" button
    const sbBtn = document.getElementById("staff-back-btn");
    if (sbBtn) {
      const handler = e => {
        e.preventDefault(); resetIdle();
        staffMode = "dropdown";
        form.staff = "";
        if (focus === "staff") focus = "visitor_name";
        fullRender();
      };
      sbBtn.addEventListener("click", handler);
      sbBtn.addEventListener("touchstart", handler, { passive: false });
    }

    sc.querySelectorAll("[data-field]").forEach(el => {
      el.addEventListener("click", () => {
        resetIdle();
        if (isKana && rbuf) { form[focus] += rbuf === "n" ? "ん" : rbuf; rbuf = ""; }
        focus = el.dataset.field;
        fullRender();
      });
    });

    sc.querySelectorAll("[data-key]").forEach(btn => {
      const press = e => { e.preventDefault(); resetIdle(); handleKey(btn.dataset.key); };
      btn.addEventListener("mousedown", press);
      btn.addEventListener("touchstart", press, { passive: false });
    });

    document.getElementById("kana-btn").addEventListener("mousedown", e => {
      e.preventDefault(); resetIdle();
      if (isKana && rbuf) { form[focus] += rbuf === "n" ? "ん" : rbuf; rbuf = ""; }
      isKana = !isKana; shifted = false; fullRender();
    });
    document.getElementById("kana-btn").addEventListener("touchstart", e => {
      e.preventDefault(); resetIdle();
      if (isKana && rbuf) { form[focus] += rbuf === "n" ? "ん" : rbuf; rbuf = ""; }
      isKana = !isKana; shifted = false; fullRender();
    }, { passive: false });

    document.getElementById("send-btn").addEventListener("click", handleSubmit);

    // Purpose dropdown handlers
    if (USE_PURPOSE_DROPDOWN && purposeMode === "dropdown") {
      sc.querySelectorAll("[data-purpose-name]").forEach(btn => {
        btn.addEventListener("click", () => {
          resetIdle();
          form.purpose = btn.dataset.purposeName;
          fullRender();
        });
      });
      const pfBtn = document.getElementById("purpose-freetext-btn");
      if (pfBtn) pfBtn.addEventListener("click", () => {
        resetIdle();
        form.purpose = "";
        purposeMode = "freetext";
        focus = "purpose";
        fullRender();
      });
    } else if (USE_PURPOSE_DROPDOWN && purposeMode === "freetext") {
      const pbBtn = document.getElementById("purpose-back-btn");
      if (pbBtn) pbBtn.addEventListener("click", () => {
        resetIdle();
        form.purpose = "";
        purposeMode = "dropdown";
        if (focus === "purpose") focus = "visitor_name";
        fullRender();
      });
    }
  }

  function handleKey(key) {
    // If focus is on purpose and we are in dropdown mode, redirect input to visitor_name
    if (focus === "purpose" && USE_PURPOSE_DROPDOWN && purposeMode === "dropdown") focus = "visitor_name";
    if (key === "⌫") {
      if (isKana && rbuf.length > 0) rbuf = rbuf.slice(0, -1);
      else form[focus] = form[focus].slice(0, -1);
    } else if (key === "shift") {
      shifted = !shifted;
    } else if (key === "space") {
      if (isKana && rbuf) { form[focus] += rbuf === "n" ? "ん" : rbuf; rbuf = ""; }
      form[focus] += " ";
    } else if (isKana && /^[a-z-]$/i.test(key)) {
      const r = cvt(rbuf, key.toLowerCase());
      if (r.out) form[focus] += r.out;
      rbuf = r.buf;
    } else {
      if (isKana && rbuf) { form[focus] += rbuf === "n" ? "ん" : rbuf; rbuf = ""; }
      form[focus] += shifted ? key.toUpperCase() : key;
      if (shifted) shifted = false;
    }
    fullRender();
  }

  async function handleSubmit() {
    if (submitting) return;
    if (isKana && rbuf) { form[focus] += rbuf === "n" ? "ん" : rbuf; rbuf = ""; }
    if (!form.visitor_name.trim()) { errMsg = "お名前を入力してください"; fullRender(); return; }
    const token = localStorage.getItem(TOKEN_KEY);
    if (!token) { cleanup(); showSetup(); return; }
    submitting = true; fullRender();
    try {
      await apiPost("/proxy/reception", {
        visitor_name: form.visitor_name, company: form.company,
        purpose: form.purpose, staff: form.staff, method: "form",
      }, token);
      cleanup();
      go("calling", { name: form.visitor_name, staff: form.staff });
    } catch (e) {
      errMsg = e.message || "受付に失敗しました";
      submitting = false; fullRender();
    }
  }

  fullRender();
}

// ─── QR ───────────────────────────────────────────────────────────────────────
function showQr() {
  const bc = ST.brand_color;
  const qt = QR_THEMES[ST.kiosk_style] ?? QR_THEMES.default;
  const devName = escHtml(localStorage.getItem(NAME_KEY) ?? "kiosk");
  let stream = null, scanning = false, submitting = false, errMsg = "", supported = null;
  let idleId, countId;

  function resetIdle() {
    clearTimeout(idleId);
    clearInterval(countId);
    let c = ST.kiosk_idle_timeout_sec;
    const update = () => {
      const cEl = document.getElementById("qr-cnt");
      const bEl = document.getElementById("qr-bar");
      const urgent = c <= 10;
      const color = urgent ? "#a84238" : qt.accent;
      if (cEl) { cEl.textContent = c; cEl.style.color = color; }
      if (bEl) { bEl.style.width = `${(c / ST.kiosk_idle_timeout_sec) * 100}%`; bEl.style.background = color; }
      [document.getElementById("qr-cnt-lbl"), document.getElementById("qr-cnt-s")].forEach(el => { if (el) el.style.color = urgent ? "#a84238" : qt.muted; });
    };
    update();
    idleId = setTimeout(() => { stopStream(); cleanup(); go("idle"); }, ST.kiosk_idle_timeout_sec * 1000);
    countId = setInterval(() => { c--; if (c <= 0) { clearInterval(countId); return; } update(); }, 1000);
  }
  CLEANUPS.push(() => { clearTimeout(idleId); clearInterval(countId); stopStream(); });

  function stopStream() {
    scanning = false;
    stream?.getTracks().forEach(t => t.stop());
    stream = null;
  }

  function camContent() {
    if (submitting) return `<div style="text-align:center;color:#fff"><div style="width:60px;height:60px;border-radius:50%;border:3px solid rgba(255,255,255,.2);border-top-color:${qt.accent};animation:spin .8s linear infinite;margin:0 auto 20px"></div><div style="font-size:18px;opacity:.7">受付処理中…</div></div>`;
    if (supported === false) return `<div style="text-align:center;color:#fff;padding:40px;font-size:18px;opacity:.6;line-height:1.6">QRスキャン非対応のブラウザです<br>Chromiumをご利用ください</div>`;
    const corners = [[0,0,0],[0,1,90],[1,1,180],[1,0,270]].map(([tb,lr,rot]) =>
      `<div style="position:absolute;${tb?"bottom":"top"}:-3px;${lr?"right":"left"}:-3px;width:56px;height:56px;transform:rotate(${rot}deg);border-top:5px solid ${qt.accent};border-left:5px solid ${qt.accent};border-radius:12px 0 0 0"></div>`
    ).join("");
    return `
<div style="position:absolute;inset:60px;border:3px dashed rgba(255,255,255,.2);border-radius:20px">
  ${corners}
  ${scanning ? `<div style="position:absolute;left:0;right:0;height:3px;background:${qt.accent};box-shadow:0 0 24px ${qt.accent};animation:scan-line 2s linear infinite"></div>` : ""}
</div>
<video id="qr-vid" muted playsinline style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.85"></video>
<div style="position:absolute;bottom:24px;left:0;right:0;display:flex;justify-content:center">
  <span style="display:inline-flex;align-items:center;gap:8px;background:rgba(0,0,0,.5);color:#fff;padding:8px 20px;border-radius:999px;font-size:15px">
    <span style="width:7px;height:7px;border-radius:50%;background:${qt.accent};animation:dot-pulse 1.4s ease-in-out infinite"></span>
    ${scanning ? "読み取り中…" : "カメラ準備中…"}
  </span>
</div>`;
  }

  function render() {
    sc.innerHTML = `
<div style="width:1920px;height:1080px;background:${qt.bg};display:flex;flex-direction:column">
  <div style="padding:20px 80px 0;flex-shrink:0">
    <button id="qr-back" style="display:inline-flex;align-items:center;gap:8px;padding:10px 20px;background:${qt.card};border:1px solid ${qt.border};border-radius:999px;font-size:15px;color:${qt.sub};cursor:pointer">← 戻る</button>
  </div>
  <div style="flex:1;padding:4px 80px 0;display:grid;grid-template-columns:1fr 1fr;gap:56px;align-items:center;min-height:0">
    <div id="cam-box" style="background:${qt.camBg};border-radius:28px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;height:100%;max-height:760px">
      ${camContent()}
    </div>
    <div style="display:flex;flex-direction:column">
      <div style="font-size:64px;font-weight:600;color:${qt.text};letter-spacing:-2px;line-height:1.15;margin-bottom:18px">QR コードを<br>かざしてください</div>
      <div style="font-size:20px;color:${qt.sub};line-height:1.6;margin-bottom:36px">メールでお送りした招待コードを<br>左の読み取り口へ</div>
      ${errMsg ? `<div style="padding:16px 20px;background:rgba(168,66,56,.12);border:1px solid rgba(168,66,56,.3);border-radius:14px;color:#f87171;font-size:16px;line-height:1.6;margin-bottom:24px">${escHtml(errMsg)}</div>` : ""}
      <div style="display:flex;gap:14px">
        <button id="qr-form1" style="flex:1;padding:20px;background:${qt.btnLight};border:2px solid ${qt.border};border-radius:14px;font-size:17px;font-weight:500;color:${qt.text};cursor:pointer">QR を持っていない</button>
        <button id="qr-form2" style="flex:1;padding:20px;background:${qt.btnDark};border:2px solid ${qt.btnDark};border-radius:14px;font-size:17px;font-weight:600;color:#fff;cursor:pointer">フォームで受付する →</button>
      </div>
    </div>
  </div>
  <div style="padding:16px 80px 28px;display:flex;align-items:center;color:${qt.muted};font-size:13px;flex-shrink:0">
    <span id="qr-clk" style="font-family:'JetBrains Mono',monospace;font-size:14px"></span>
    <span style="flex:1"></span>
    <div style="display:flex;align-items:center;gap:12px">
      <span id="qr-cnt-lbl">待機画面に戻るまで</span>
      <span id="qr-cnt" style="font-size:20px;font-weight:700;font-family:'JetBrains Mono',monospace;color:${qt.sub};min-width:36px;text-align:right;transition:color .3s">${ST.kiosk_idle_timeout_sec}</span>
      <span id="qr-cnt-s">秒</span>
      <div style="width:160px;height:6px;background:${qt.barBg};border-radius:3px;overflow:hidden">
        <div id="qr-bar" style="width:100%;height:100%;background:${qt.accent};border-radius:3px;transition:width 1s linear,background .3s"></div>
      </div>
    </div>
    <span style="flex:1"></span>
    <span style="font-family:'JetBrains Mono',monospace">${devName}</span>
  </div>
</div>`;
    rescale();
    document.getElementById("qr-clk").textContent = fmtClock();
    document.getElementById("qr-back").addEventListener("click",  () => { stopStream(); cleanup(); go("top"); });
    document.getElementById("qr-form1").addEventListener("click", () => { stopStream(); cleanup(); go("reception"); });
    document.getElementById("qr-form2").addEventListener("click", () => { stopStream(); cleanup(); go("reception"); });
    onSc("click", resetIdle);
    // Re-attach video stream after re-render
    if (stream) {
      const vid = document.getElementById("qr-vid");
      if (vid) { vid.srcObject = stream; vid.play().catch(() => {}); }
    }
  }

  function refreshCam() {
    const box = document.getElementById("cam-box");
    if (!box) return;
    box.innerHTML = camContent();
    if (stream) {
      const vid = document.getElementById("qr-vid");
      if (vid) { vid.srcObject = stream; vid.play().catch(() => {}); }
    }
  }

  async function startCamera() {
    try {
      stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } } });
      const vid = document.getElementById("qr-vid");
      if (vid) { vid.srcObject = stream; await vid.play(); }
      scanning = true; refreshCam(); scanLoop();
    } catch {
      errMsg = "カメラを起動できませんでした。アクセス許可を確認してください。"; render();
    }
  }

  async function scanLoop() {
    if (!scanning) return;
    const vid = document.getElementById("qr-vid");
    if (!vid) return;
    try {
      const det = new BarcodeDetector({ formats: ["qr_code"] });
      const codes = await det.detect(vid);
      if (codes.length > 0 && codes[0].rawValue) {
        scanning = false; await handleQR(codes[0].rawValue); return;
      }
    } catch {}
    if (scanning) requestAnimationFrame(scanLoop);
  }

  async function handleQR(raw) {
    const token = localStorage.getItem(TOKEN_KEY);
    if (!token) { stopStream(); cleanup(); showSetup(); return; }

    // 予約トークン方式: appt:{token}
    if (raw.startsWith("appt:")) {
      const apptToken = raw.slice(5).trim();
      submitting = true; refreshCam();
      try {
        const appt = await apiGet("/proxy/appointment/" + encodeURIComponent(apptToken), token);
        await apiPost("/proxy/reception", {
          visitor_name: appt.visitor_name,
          company: appt.company || "",
          purpose: appt.purpose || "",
          staff: appt.staff || "",
          method: "appointment",
          appointment_id: appt.id,
        }, token);
        stopStream(); cleanup(); go("calling", { name: appt.visitor_name, staff: appt.staff || "" });
      } catch (e) {
        errMsg = e.message || "予約情報の取得に失敗しました"; submitting = false; scanning = true; render(); scanLoop();
      }
      return;
    }

    // 既存: URL パース方式（後方互換）
    let name = "", company = "", purpose = "";
    try {
      const u = new URL(raw);
      name = u.searchParams.get("name") ?? ""; company = u.searchParams.get("company") ?? ""; purpose = u.searchParams.get("purpose") ?? "";
    } catch { name = raw.trim(); }
    if (!name) { errMsg = "QRコードから来訪者情報を読み取れませんでした。"; scanning = true; refreshCam(); scanLoop(); return; }
    submitting = true; refreshCam();
    try {
      await apiPost("/proxy/reception", { visitor_name: name, company, purpose, method: "qr" }, token);
      stopStream(); cleanup(); go("calling", { name, staff: "" });
    } catch (e) {
      errMsg = e.message || "受付処理に失敗しました"; submitting = false; scanning = true; render(); scanLoop();
    }
  }

  render();
  resetIdle();

  if (typeof BarcodeDetector === "undefined") { supported = false; refreshCam(); }
  else { supported = true; startCamera(); }
}

function showCalling(visitorName, staff) {
  const bc = ST.brand_color;
  const vName = visitorName || "";
  const callingMsg = ST.kiosk_calling_message;
  const style = ST?.kiosk_style || "default";
  const builder = CALLING_TEMPLATES[style] || CALLING_TEMPLATES["default"];
  sc.innerHTML = builder(vName, staff || "", bc, callingMsg, ST);
  rescale();
  const clk = document.getElementById("cal-clk");
  if (clk) clk.textContent = fmtClock();
  every(30000, () => { const c = document.getElementById("cal-clk"); if (c) c.textContent = fmtClock(); });
  later(4000, () => { cleanup(); go("complete", { name: visitorName, staff }); });
}

function showComplete(visitorName, staff) {
  const bc = ST.brand_color;
  const returnSec = ST.kiosk_complete_timeout_sec;
  const vName = visitorName || "お客様";
  let count = returnSec;
  const now = new Date().toLocaleTimeString("ja-JP", { hour: "2-digit", minute: "2-digit" });
  const completeMsg = ST.kiosk_complete_message;

  const builder = COMPLETE_TEMPLATES[ST.kiosk_style] ?? COMPLETE_TEMPLATES.default;
  sc.innerHTML = builder(vName, staff || "", bc, count, now, completeMsg);
  rescale();

  every(1000, () => {
    count--;
    if (count <= 0) { cleanup(); go("idle"); return; }
    const cEl = document.getElementById("cnt");
    const bEl = document.getElementById("bar");
    const urgent = count <= 5;
    if (cEl) { cEl.textContent = count; cEl.style.color = urgent ? "#a84238" : bc; }
    if (bEl) { bEl.style.width = `${(count / returnSec) * 100}%`; bEl.style.background = urgent ? "#a84238" : bc; }
  });
}

  CURRENT_SCREEN = "suspended";

  sc.offsetHeight;
  sc.style.animation = "fade-in .18s ease-out";
  sc.innerHTML = `<div style="width:1920px;height:1080px;background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;user-select:none"><div style="display:flex;flex-direction:column;align-items:center;gap:28px;text-align:center"><div style="width:80px;height:80px;border-radius:20px;border:2px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;margin-bottom:8px"><svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.35)" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div><div style="font-size:72px;font-weight:300;color:rgba(255,255,255,.85);letter-spacing:-1px;line-height:1.1">メンテナンス中</div><div style="font-size:28px;color:rgba(255,255,255,.45);font-weight:300;letter-spacing:.5px">しばらくお待ちください</div><div style="font-size:16px;color:rgba(255,255,255,.25);margin-top:8px;letter-spacing:.3px">このシステムは一時的にご利用いただけません</div></div></div>`;
  rescale();
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
async function boot() {
  sc.innerHTML = `<div style="width:1920px;height:1080px;background:#0a0806;display:flex;align-items:center;justify-content:center"><div style="color:rgba(255,255,255,.3);font-size:18px">読み込み中…</div></div>`;
  rescale();

  try {
    CFG = await apiGet("/config");
  } catch (e) {
    sc.innerHTML = `<div style="width:1920px;height:1080px;background:#0a0806;display:flex;align-items:center;justify-content:center"><div style="color:#f88;font-size:16px;text-align:center">エージェントに接続できません<br>${escHtml(e.message)}</div></div>`;
    rescale(); return;
  }

  const token = localStorage.getItem(TOKEN_KEY);
  if (!token) { showSetup(); return; }

  // Load settings + schedule in parallel
  try {
    const [settings, sched] = await Promise.all([
      apiGet("/proxy/settings").catch(() => null),
      apiGet("/proxy/schedule", token).catch(e => {
        if (e.message === "Invalid kiosk token") {
          localStorage.removeItem(TOKEN_KEY); localStorage.removeItem(NAME_KEY);
        }
        return null;
      }),
    ]);
    if (!localStorage.getItem(TOKEN_KEY)) { showSetup(); return; }
    if (settings) Object.assign(ST, settings);
    if (sched?.suspended) {
      showSuspended();
    } else {
      ITEMS = sched?.playlist?.items ?? [];
      go("idle");
    }
  } catch {
    go("idle");
  }

  // Poll schedule every 60 s
  setInterval(async () => {
    const t = localStorage.getItem(TOKEN_KEY);
    if (!t) return;
    try {
      const s = await apiGet("/proxy/schedule", t);
      if (s?.suspended) {
        if (CURRENT_SCREEN !== "suspended") showSuspended();
      } else {
        if (CURRENT_SCREEN === "suspended") { ITEMS = s?.playlist?.items ?? []; go("idle"); }
        else ITEMS = s?.playlist?.items ?? [];
      }
    } catch {}
  }, 60000);

  // Poll /update-status every 30 s; apply when idle or force-flagged
  setInterval(async () => {
    try {
      const s = await fetch("/update-status").then(r => r.json());
      if (!s.ready) return;
      if (!s.force && CURRENT_SCREEN !== "idle") return;
      await fetch("/apply-update", { method: "POST" });
      setTimeout(() => location.reload(), 500);
    } catch {}
  }, 30000);
}

boot();
</script>
