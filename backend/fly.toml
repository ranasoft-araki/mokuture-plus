# Fly.io deployment config for mokuture+ backend
app = "mokuture-plus-api"
primary_region = "nrt"  # Tokyo

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
